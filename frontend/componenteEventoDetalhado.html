<div class="conteudo" data-acao="abrir-detalhes-evento">
    <h2 class="data"><span data-prop="mes" class="mes"></span> <br> <span data-prop="dia" class="dia"></span></h2>

    <div class="coluna02">

        <div class="classificacoes">
            <span class="classificacao tipo_evento" data-prop="tipo"></span>
            <span class="classificacao confirmado">Você confirmou</span>
        </div>

        <h1 data-prop="titulo"></h1>
        
        <div class="icon_info">
            <img src="./images/icone-relogio.svg">
            <p class="info" data-prop="hora"></p>
        </div>

        <div class="icon_info">
            <img src="./images/icone-pin-localizacao.svg">
            <p class="info" data-prop="local"></p>
        </div>

        <div class="icon_info">
            <img src="./images/icone-duas-pessoas.svg">
            <p class="info"><span data-prop="confirmados"></span> pessoa(s) confirmada(s)</p>
        </div>

        <p class="quem_organizou">Organizado por <span data-prop="organizador"></span></p>

    </div>
</div>

<hr class="c-componenteEventoDetalhado">
